            },
            NOL: {
                name: 'Petiolar Node Length',
                abbrev: 'NOL',
                body_part: 'petiole',
                view: 'profile',
                description: 'The length of the petiolar node. Though this character is fairly difficult to measure, the accuracy of that measurement is high.',
                figure: 'Fig. 3'
            },
            PEH: {
                name: 'Petiole Height',
                abbrev: 'PEH',
                body_part: 'petiole',
                view: 'profile',
                description: 'The maximum height of the petiole.',
                figure: 'Fig. 4'
            },
            PEL: {
                name: 'Petiole Length',
                abbrev: 'PEL',
                body_part: 'petiole',
                view: 'profile',
                description: 'The distance between the posteriormost point of the petiole and the petiolar spiracle.',
                figure: 'Fig. 3'
            },
            PEW: {
                name: 'Petiole Width',
                abbrev: 'PEW',
                body_part: 'petiole',
                view: 'dorsal',
                description: 'The maximum width of the petiole in dorsal view.',
                figure: 'Fig. 3'
            },

            // POSTPETIOLE MEASUREMENTS
            PPH: {
                name: 'Postpetiole Height',
                abbrev: 'PPH',
                body_part: 'postpetiole',
                view: 'profile',
                description: 'The maximum height of the postpetiole in lateral view.',
                figure: 'Fig. 4'
            },
            PPL: {
                name: 'Postpetiole Length',
                abbrev: 'PPL',
                body_part: 'postpetiole',
                view: 'profile',
                description: 'The maximum length of the postpetiole in lateral view.',
                figure: 'Fig. 3'
            },
            PPW: {
                name: 'Postpetiole Width',
                abbrev: 'PPW',
                body_part: 'postpetiole',
                view: 'dorsal',
                description: 'The maximum width of the postpetiole in dorsal view.',
                figure: 'Fig. 3'
            }
        };

        // Group morphometrics by body part for UI
        const MORPHO_BY_PART = {
            head: ['CL', 'CW', 'CS', 'EH', 'EL', 'EYE', 'OMD', 'FL', 'FR', 'POC', 'SL'],
            mesosoma: ['ML', 'MW', 'SPL', 'SPSP'],
            petiole: ['NOH', 'NOL', 'PEH', 'PEL', 'PEW'],
            postpetiole: ['PPH', 'PPL', 'PPW']
        };

        let annotations = {}; // { filename: { part: [ {type, ...coords} ] } }
        let currentAnnotations = []; // Flat array of annotations for current image
        let selectedAnnotation = null;
        let isDrawing = false;
        let drawStart = null;
        let polyPoints = [];
        let polyMousePos = null; // Current mouse position for polygon preview
        let canvas = null;
        let ctx = null;
        let deleteMode = false; // Delete mode active
        let lineStart = null;   // Start point for line drawing
        let tempScaleLine = null; // Temporary scale line data before saving

        // Edit mode state for vertex/corner/endpoint editing
        let editMode = false;
        let editingAnnotationIndex = null; // Index in currentAnnotations
        let draggedVertexIndex = null; // Index in points/corners/endpoints
        let draggedVertexType = null; // 'poly', 'box', or 'line'
        let isDraggingVertex = false;

        // Zoom state
        let zoomLevel = 1;
        const ZOOM_MIN = 0.5;
        const ZOOM_MAX = 8;
        const ZOOM_STEP = 0.25;
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let scrollStart = { x: 0, y: 0 };
        // Base dimensions at zoom level 1 (fitted to container)
        let baseWidth = 0;
        let baseHeight = 0;

        function initAnnotations() {
            canvas = document.getElementById('annotationCanvas');
            ctx = canvas.getContext('2d');

            // Load saved annotations
            const saved = localStorage.getItem('antworld_annotations_v1');
            if (saved) {
                try { annotations = JSON.parse(saved); } catch (e) { annotations = {}; }
            }

            // Canvas event listeners
            canvas.addEventListener('mousedown', onCanvasMouseDown);
            canvas.addEventListener('mousemove', onCanvasMouseMove);
            canvas.addEventListener('mouseup', onCanvasMouseUp);
            canvas.addEventListener('dblclick', onCanvasDblClick);
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            // Delete mode toggle
            document.getElementById('deleteAnnotBtn').addEventListener('click', toggleDeleteMode);

            // Edit mode toggle
            document.getElementById('editAnnotBtn').addEventListener('click', toggleEditMode);

            // Select to delete dropdown
            document.getElementById('selectDeleteBtn').addEventListener('click', toggleDeleteDropdown);
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDeleteSelected);

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                const dropdown = document.getElementById('deleteDropdown');
                const btn = document.getElementById('selectDeleteBtn');
                if (dropdown && !dropdown.contains(e.target) && e.target !== btn) {
                    dropdown.style.display = 'none';
                }
            });

            // Clear all button
            document.getElementById('clearAnnotBtn').addEventListener('click', clearAllAnnotations);

            // Save scale button
            document.getElementById('saveScaleBtn').addEventListener('click', saveScaleLine);

            // Part select change - auto-switch to line mode for scale/measurement
            document.getElementById('partSelect').addEventListener('change', (e) => {
                const measurementSelect = document.getElementById('measurementSelect');
                const freehandLabel = document.getElementById('freehandLabel');
                if (e.target.value === 'scale') {
                    document.querySelector('input[name="drawMode"][value="line"]').checked = true;
                    measurementSelect.style.display = 'none';
                    freehandLabel.style.display = 'none';
                } else if (e.target.value === 'measurement') {
                    document.querySelector('input[name="drawMode"][value="line"]').checked = true;
                    measurementSelect.style.display = 'inline-block';
                    freehandLabel.style.display = 'inline-block';
                } else if (e.target.value !== 'ignore') {
                    // Switch back to poly mode for body parts
                    document.querySelector('input[name="drawMode"][value="poly"]').checked = true;
                    measurementSelect.style.display = 'none';
                    freehandLabel.style.display = 'none';
                } else {
                    measurementSelect.style.display = 'none';
                    freehandLabel.style.display = 'none';
                }
                // Hide scale inputs when not scale
                if (e.target.value !== 'scale' && !tempScaleLine) {
                    document.getElementById('scaleInputs').style.display = 'none';
                }
            });

            // Resize canvas when image loads
            document.getElementById('currentImage').addEventListener('load', resizeCanvas);

            // Zoom controls
            document.getElementById('zoomInBtn').addEventListener('click', () => setZoom(zoomLevel + ZOOM_STEP));
            document.getElementById('zoomOutBtn').addEventListener('click', () => setZoom(zoomLevel - ZOOM_STEP));
            document.getElementById('zoomFitBtn').addEventListener('click', zoomToFit);
            document.getElementById('zoom100Btn').addEventListener('click', () => setZoom(1));

            // Mouse wheel zoom (Ctrl+wheel) and prevent navigation gestures
            const imageContainer = document.querySelector('.image-container');
            imageContainer.addEventListener('wheel', onWheelZoom, { passive: false });

            // Prevent horizontal wheel/scroll from triggering browser back/forward
            imageContainer.addEventListener('wheel', (e) => {
                if (zoomLevel > 1) {
                    // When zoomed, prevent all wheel events from bubbling to browser
                    e.stopPropagation();
                }
            }, { passive: true });

            // Pan with middle mouse button or when zoomed > 100%
            imageContainer.addEventListener('mousedown', onPanStart);
            imageContainer.addEventListener('mousemove', onPanMove);
            imageContainer.addEventListener('mouseup', onPanEnd);
            imageContainer.addEventListener('mouseleave', onPanEnd);

            // Prevent back/forward mouse buttons
            imageContainer.addEventListener('mousedown', (e) => {
                if (e.button === 3 || e.button === 4) {
                    e.preventDefault();
                }
            });
        }

        function resizeCanvas() {
            const img = document.getElementById('currentImage');
            canvas.width = img.offsetWidth;
            canvas.height = img.offsetHeight;
            loadCurrentAnnotations();
            renderAnnotations();
        }

        // ==================== ZOOM SYSTEM ====================

        function setZoom(level) {
            zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, level));
            applyZoom();
        }

        function applyZoom() {
            const wrapper = document.querySelector('.annotation-wrapper');
            const container = document.querySelector('.image-container');

            wrapper.style.transform = `scale(${zoomLevel})`;

            // Update zoom level display
            document.getElementById('zoomLevel').textContent = `${Math.round(zoomLevel * 100)}%`;

            // Update button states
            document.getElementById('zoomInBtn').disabled = zoomLevel >= ZOOM_MAX;
            document.getElementById('zoomOutBtn').disabled = zoomLevel <= ZOOM_MIN;

            // Add/remove zoomed class for cursor styling
            if (zoomLevel > 1) {
                container.classList.add('zoomed');
            } else {
                container.classList.remove('zoomed');
            }
        }

        function zoomToFit() {
            setZoom(1);
            // Reset scroll position
            const container = document.querySelector('.image-container');
            container.scrollLeft = 0;
            container.scrollTop = 0;
        }

        function onWheelZoom(e) {
            // Only zoom if Ctrl is held or if over the image area
            if (!e.ctrlKey && !e.metaKey) return;

            e.preventDefault();

            const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
            const container = document.querySelector('.image-container');
            const wrapper = document.querySelector('.annotation-wrapper');

            // Get mouse position relative to container
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + container.scrollLeft;
            const mouseY = e.clientY - rect.top + container.scrollTop;

            // Calculate position in image space before zoom
            const imgX = mouseX / zoomLevel;
            const imgY = mouseY / zoomLevel;

            // Apply new zoom
            const oldZoom = zoomLevel;
            setZoom(zoomLevel + delta);

            // Adjust scroll to keep mouse position stable
            if (zoomLevel !== oldZoom) {
                const newMouseX = imgX * zoomLevel;
                const newMouseY = imgY * zoomLevel;
                container.scrollLeft += newMouseX - mouseX;
                container.scrollTop += newMouseY - mouseY;
            }
        }

        function onPanStart(e) {
            // Middle mouse button (1) or left button when zoomed > 1 and Shift held
            if (e.button === 1 || (e.button === 0 && e.shiftKey && zoomLevel > 1)) {
                e.preventDefault();
                isPanning = true;
                panStart = { x: e.clientX, y: e.clientY };
                const container = document.querySelector('.image-container');
                scrollStart = { x: container.scrollLeft, y: container.scrollTop };
                container.style.cursor = 'grabbing';
            }
        }

        function onPanMove(e) {
            if (!isPanning) return;
            e.preventDefault();
            const container = document.querySelector('.image-container');
            const dx = e.clientX - panStart.x;
            const dy = e.clientY - panStart.y;
            container.scrollLeft = scrollStart.x - dx;
            container.scrollTop = scrollStart.y - dy;
        }

        function onPanEnd(e) {
            if (isPanning) {
                isPanning = false;
                const container = document.querySelector('.image-container');
                container.style.cursor = zoomLevel > 1 ? 'grab' : '';
            }
        }

        function resetZoom() {
            zoomLevel = 1;
            applyZoom();
            const container = document.querySelector('.image-container');
            container.scrollLeft = 0;
            container.scrollTop = 0;
        }

        function selectPart(part) {
            const partSelect = document.getElementById('partSelect');
            partSelect.value = part;
            // Trigger change event to update UI (measurement select visibility, draw mode)
            partSelect.dispatchEvent(new Event('change'));
        }

        function setDrawMode(mode) {
            document.querySelector(`input[name="drawMode"][value="${mode}"]`).checked = true;
        }

        function getSelectedPart() {
            return document.getElementById('partSelect').value;
        }

        function getDrawMode() {
            return document.querySelector('input[name="drawMode"]:checked').value;
        }

        function loadCurrentAnnotations() {
            if (images.length === 0) return;
            const img = images[currentIndex];
            currentAnnotations = [];

            const imgAnnots = annotations[img.filename];
            if (imgAnnots) {
                Object.entries(imgAnnots).forEach(([part, annots]) => {
                    // Migrate legacy "head" to "cranium"
                    const normalizedPart = part === 'head' ? 'cranium' : part;
                    annots.forEach((a, idx) => {
                        currentAnnotations.push({ ...a, part: normalizedPart, id: `${normalizedPart}_${idx}` });
                    });
                });
            }
            selectedAnnotation = null;

            // Exit delete mode when changing images
            if (deleteMode) {
                deleteMode = false;
                const btn = document.getElementById('deleteAnnotBtn');
                const canvas = document.getElementById('annotationCanvas');
                if (btn) {
                    btn.classList.remove('delete-mode-active');
                    btn.textContent = 'Delete Mode';
                }
                if (canvas) canvas.classList.remove('delete-mode');
            }

            // Close dropdown
            const dropdown = document.getElementById('deleteDropdown');
            if (dropdown) dropdown.style.display = 'none';

            // Auto-extract colors for existing annotations if not already saved
            const gradeData = grades[img.filename];
            const savedColors = gradeData?.color || {};
            setTimeout(() => {
                ['head', 'mesosoma', 'gaster'].forEach(colorPart => {
                    const partKey = colorPart === 'head' ? 'cranium' : colorPart;
                    const hasAnnotation = currentAnnotations.some(a => a.part === partKey && a.type === 'poly');
                    const hasColor = savedColors[colorPart]?.glad || savedColors[colorPart];
                    if (hasAnnotation && !hasColor) {
                        autoExtractColor(colorPart);
                    }
                });
            }, 200);

            updateAnnotCount();
        }

        function saveCurrentAnnotations() {
            if (images.length === 0) return;
            const img = images[currentIndex];

            // Group by part
            const byPart = {};
            currentAnnotations.forEach(a => {
                if (!byPart[a.part]) byPart[a.part] = [];
                const { part, id, ...coords } = a;
                byPart[a.part].push(coords);
            });

            if (Object.keys(byPart).length > 0) {
                annotations[img.filename] = byPart;
            } else {
                delete annotations[img.filename];
            }

            localStorage.setItem('antworld_annotations_v1', JSON.stringify(annotations));
            updateAnnotCount();
        }

        function updateAnnotCount() {
            const countEl = document.getElementById('annotCount');
            if (!countEl) return;

            // Count by part
            const counts = {};
            currentAnnotations.forEach(a => {
                counts[a.part] = (counts[a.part] || 0) + 1;
            });

            const parts = Object.entries(counts).map(([p, c]) => `${p[0].toUpperCase()}:${c}`);
            countEl.textContent = parts.length > 0 ? parts.join(' ') : '';
        }

        function renderAnnotations() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw all annotations
            currentAnnotations.forEach((a, idx) => {
                const color = PART_COLORS[a.part] || '#fff';
                const isSelected = selectedAnnotation === idx;

                ctx.strokeStyle = color;
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.fillStyle = color + '33'; // 20% opacity

                if (a.type === 'box') {
                    const isEditSelected = editMode && editingAnnotationIndex === idx;

                    // Highlight selected box
                    if (isEditSelected) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(a.x, a.y, a.w, a.h);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 2;
                    }
                    ctx.strokeRect(a.x, a.y, a.w, a.h);
                    ctx.fillStyle = isEditSelected ? color + '55' : color + '33';
                    ctx.fillRect(a.x, a.y, a.w, a.h);

                    // Draw corner handles in edit mode
                    if (editMode) {
                        const corners = [
                            [a.x, a.y], [a.x + a.w, a.y],
                            [a.x + a.w, a.y + a.h], [a.x, a.y + a.h]
                        ];
                        corners.forEach((c, ci) => {
                            const isDragged = isEditSelected && draggedVertexIndex === ci && draggedVertexType === 'box';
                            ctx.beginPath();
                            ctx.rect(c[0] - (isDragged ? 5 : 4), c[1] - (isDragged ? 5 : 4), isDragged ? 10 : 8, isDragged ? 10 : 8);
                            ctx.fillStyle = isEditSelected ? '#fff' : color;
                            ctx.fill();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        });
                    }

                    // Label
                    ctx.fillStyle = color;
                    ctx.font = '12px sans-serif';
                    ctx.fillText(a.part, a.x + 2, a.y - 4);
                } else if (a.type === 'poly' && a.points.length > 1) {
                    const isEditSelected = editMode && editingAnnotationIndex === idx;

                    ctx.beginPath();
                    ctx.moveTo(a.points[0][0], a.points[0][1]);
                    for (let i = 1; i < a.points.length; i++) {
                        ctx.lineTo(a.points[i][0], a.points[i][1]);
                    }
                    ctx.closePath();

                    // Highlight selected polygon
                    if (isEditSelected) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 2;
                    }
                    ctx.stroke();
                    ctx.fillStyle = isEditSelected ? color + '55' : color + '33';
                    ctx.fill();

                    // Draw vertex handles in edit mode
                    if (editMode) {
                        a.points.forEach((p, vi) => {
                            const isDragged = isEditSelected && draggedVertexIndex === vi;
                            ctx.beginPath();
                            ctx.arc(p[0], p[1], isDragged ? 8 : 6, 0, Math.PI * 2);
                            ctx.fillStyle = isEditSelected ? '#fff' : color;
                            ctx.fill();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        });
                    }

                    // Label
                    ctx.fillStyle = color;
                    ctx.font = '12px sans-serif';
                    ctx.fillText(a.part, a.points[0][0] + 2, a.points[0][1] - 4);
                } else if (a.type === 'line') {
                    const isEditSelected = editMode && editingAnnotationIndex === idx;

                    // Draw line (highlighted if selected)
                    if (isEditSelected) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(a.x1, a.y1);
                        ctx.lineTo(a.x2, a.y2);
                        ctx.stroke();
                    }
                    ctx.strokeStyle = color + '99';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(a.x1, a.y1);
                    ctx.lineTo(a.x2, a.y2);
                    ctx.stroke();

                    // Draw endpoint handles
                    const angle = Math.atan2(a.y2 - a.y1, a.x2 - a.x1);
                    const endpoints = [[a.x1, a.y1], [a.x2, a.y2]];

                    if (editMode) {
                        // Draw full circle handles in edit mode
                        endpoints.forEach((ep, ei) => {
                            const isDragged = isEditSelected && draggedVertexIndex === ei && draggedVertexType === 'line';
                            ctx.beginPath();
                            ctx.arc(ep[0], ep[1], isDragged ? 8 : 6, 0, Math.PI * 2);
                            ctx.fillStyle = isEditSelected ? '#fff' : color;
                            ctx.fill();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        });
                    } else {
                        // Normal half-circle endpoints
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(a.x1, a.y1, 6, angle + Math.PI / 2, angle + Math.PI * 1.5);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(a.x2, a.y2, 6, angle - Math.PI / 2, angle + Math.PI / 2);
                        ctx.stroke();
                    }

                    // Label with value or measurement type
                    const midX = (a.x1 + a.x2) / 2;
                    const midY = (a.y1 + a.y2) / 2;
                    ctx.fillStyle = color;
                    ctx.font = '12px sans-serif';
                    let label;
                    if (a.part === 'measurement' && a.measurement) {
                        label = `${a.measurement} (${a.pixelLength}px)`;
                    } else if (a.realValue && a.unit) {
                        label = `${a.realValue}${a.unit}`;
                    } else {
                        label = `${a.pixelLength}px`;
                    }
                    ctx.fillText(label, midX, midY - 8);
                }
            });

            // Draw current drawing in progress
            if (isDrawing && drawStart) {
                const color = PART_COLORS[getSelectedPart()] || '#fff';
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);

                if (getDrawMode() === 'box' && drawStart.current) {
                    const x = Math.min(drawStart.x, drawStart.current.x);
                    const y = Math.min(drawStart.y, drawStart.current.y);
                    const w = Math.abs(drawStart.current.x - drawStart.x);
                    const h = Math.abs(drawStart.current.y - drawStart.y);
                    ctx.strokeRect(x, y, w, h);
                }

                ctx.setLineDash([]);
            }

            // Draw line in progress with half-circle endpoints
            if (lineStart && polyMousePos) {
                const color = PART_COLORS[getSelectedPart()] || '#fff';
                ctx.strokeStyle = color + '99'; // 60% opacity
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);

                ctx.beginPath();
                ctx.moveTo(lineStart.x, lineStart.y);
                ctx.lineTo(polyMousePos.x, polyMousePos.y);
                ctx.stroke();
                ctx.setLineDash([]);

                // Half-circle at start point (outline only)
                const angle = Math.atan2(polyMousePos.y - lineStart.y, polyMousePos.x - lineStart.x);
                ctx.strokeStyle = color;
                ctx.beginPath();
                ctx.arc(lineStart.x, lineStart.y, 6, angle + Math.PI / 2, angle + Math.PI * 1.5);
                ctx.stroke();
                // Half-circle at current mouse position
                ctx.beginPath();
                ctx.arc(polyMousePos.x, polyMousePos.y, 6, angle - Math.PI / 2, angle + Math.PI / 2);
                ctx.stroke();

                // Show pixel length preview and snap indicator
                const dist = Math.round(Math.sqrt(
                    Math.pow(polyMousePos.x - lineStart.x, 2) +
                    Math.pow(polyMousePos.y - lineStart.y, 2)
                ));
                ctx.fillStyle = color;
                ctx.font = '12px sans-serif';
                const midX = (lineStart.x + polyMousePos.x) / 2;
                const midY = (lineStart.y + polyMousePos.y) / 2;
                const snapLabel = polyMousePos.snapped ? ` [${polyMousePos.snapped === 'horizontal' ? 'H' : 'V'}]` : '';
                ctx.fillText(`${dist}px${snapLabel}`, midX, midY - 8);
            }

            // Draw temp scale line (before saving) with half-circle endpoints
            if (tempScaleLine) {
                const color = PART_COLORS['scale'] || '#fff';
                ctx.strokeStyle = color + '99'; // 60% opacity
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(tempScaleLine.x1, tempScaleLine.y1);
                ctx.lineTo(tempScaleLine.x2, tempScaleLine.y2);
                ctx.stroke();

                // Half-circle endpoints (outline only)
                const angle = Math.atan2(tempScaleLine.y2 - tempScaleLine.y1, tempScaleLine.x2 - tempScaleLine.x1);
                ctx.strokeStyle = color;
                ctx.beginPath();
                ctx.arc(tempScaleLine.x1, tempScaleLine.y1, 6, angle + Math.PI / 2, angle + Math.PI * 1.5);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(tempScaleLine.x2, tempScaleLine.y2, 6, angle - Math.PI / 2, angle + Math.PI / 2);
                ctx.stroke();

                // Label
                ctx.fillStyle = color;
                ctx.font = '12px sans-serif';
                const midX = (tempScaleLine.x1 + tempScaleLine.x2) / 2;
                const midY = (tempScaleLine.y1 + tempScaleLine.y2) / 2;
                ctx.fillText(`${tempScaleLine.pixelLength}px`, midX, midY - 8);
            }

            // Draw polygon points in progress
            if (polyPoints.length > 0) {
                const color = PART_COLORS[getSelectedPart()] || '#fff';
                const first = polyPoints[0];
                const last = polyPoints[polyPoints.length - 1];

                // Check if mouse is near first point (sticky)
                let isNearFirst = false;
                let snapTarget = polyMousePos;
                if (polyMousePos && polyPoints.length >= 3) {
                    const dist = Math.sqrt(Math.pow(polyMousePos.x - first[0], 2) + Math.pow(polyMousePos.y - first[1], 2));
                    if (dist < 20) {
                        isNearFirst = true;
                        snapTarget = { x: first[0], y: first[1] };
                    }
                }

                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = 2;

                // Draw lines between points
                ctx.beginPath();
                ctx.moveTo(first[0], first[1]);
                for (let i = 1; i < polyPoints.length; i++) {
                    ctx.lineTo(polyPoints[i][0], polyPoints[i][1]);
                }
                ctx.stroke();

                // Draw preview line from last point to mouse/snap target
                if (snapTarget) {
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.moveTo(last[0], last[1]);
                    ctx.lineTo(snapTarget.x, snapTarget.y);
                    if (isNearFirst) {
                        // Also draw closing line to first point
                        ctx.moveTo(snapTarget.x, snapTarget.y);
                        ctx.lineTo(first[0], first[1]);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Draw points
                polyPoints.forEach((p, i) => {
                    ctx.beginPath();
                    if (i === 0) {
                        // First point - show snap zone when can close
                        if (polyPoints.length >= 3) {
                            ctx.arc(p[0], p[1], isNearFirst ? 12 : 8, 0, Math.PI * 2);
                            ctx.strokeStyle = isNearFirst ? '#fff' : color;
                            ctx.lineWidth = isNearFirst ? 3 : 2;
                            ctx.stroke();
                            ctx.fillStyle = isNearFirst ? color : color + '44';
                            ctx.fill();
                        } else {
                            ctx.arc(p[0], p[1], 4, 0, Math.PI * 2);
                            ctx.fillStyle = color;
                            ctx.fill();
                        }
                    } else {
                        ctx.arc(p[0], p[1], 4, 0, Math.PI * 2);
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                });
            }
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            // Account for zoom: divide by zoomLevel to get original image coordinates
            return {
                x: (e.clientX - rect.left) / zoomLevel,
                y: (e.clientY - rect.top) / zoomLevel
            };
        }

        function onCanvasMouseDown(e) {
            if (e.button !== 0) return; // Left click only

            const coords = getCanvasCoords(e);

            // Edit mode: click on vertex/corner/endpoint to drag, click inside annotation to select
            if (editMode) {
                const vertex = findVertexAt(coords.x, coords.y);
                if (vertex) {
                    // Start dragging this vertex/corner/endpoint
                    editingAnnotationIndex = vertex.annotationIndex;
                    draggedVertexIndex = vertex.vertexIndex;
                    draggedVertexType = vertex.type;
                    isDraggingVertex = true;
                    renderAnnotations();
                    return;
                }
                // Check if clicking inside an annotation to select it
                const annotIndex = findAnnotationAtPoint(coords.x, coords.y);
                if (annotIndex !== null) {
                    editingAnnotationIndex = annotIndex;
                    draggedVertexIndex = null;
                    renderAnnotations();
                    return;
                }
                // Clicking elsewhere deselects
                exitEditAnnotation();
                renderAnnotations();
                return;
            }

            // Delete mode: click to delete annotation
            if (deleteMode) {
                const clicked = findAnnotationAt(coords.x, coords.y);
                if (clicked !== null) {
                    currentAnnotations.splice(clicked, 1);
                    saveCurrentAnnotations();
                    renderAnnotations();
                }
                return;
            }

            const mode = getDrawMode();

            if (mode === 'box') {
                isDrawing = true;
                drawStart = { x: coords.x, y: coords.y, current: coords };
            } else if (mode === 'poly') {
                // Check if clicking near first point to close polygon
                if (polyPoints.length >= 3) {
                    const first = polyPoints[0];
                    const dist = Math.sqrt(Math.pow(coords.x - first[0], 2) + Math.pow(coords.y - first[1], 2));
                    if (dist < 15) {
                        closePolygon();
                        return;
                    }
                }
                polyPoints.push([coords.x, coords.y]);
                renderAnnotations();
            } else if (mode === 'line') {
                if (!lineStart) {
                    // First click: set start point
                    lineStart = { x: coords.x, y: coords.y };
                    renderAnnotations();
                } else {
                    // Second click: complete the line (with or without snapping)
                    const freehand = document.getElementById('freehandMode').checked;
                    const endPoint = freehand ? { x: coords.x, y: coords.y } : snapToAxis(lineStart.x, lineStart.y, coords.x, coords.y);
                    const pixelLength = Math.sqrt(
                        Math.pow(endPoint.x - lineStart.x, 2) +
                        Math.pow(endPoint.y - lineStart.y, 2)
                    );
                    const selectedPart = getSelectedPart();

                    if (selectedPart === 'measurement') {
                        // Morphometric measurement - save immediately with measurement type
                        const measurementType = document.getElementById('measurementSelect').value;
                        const measurementInfo = MORPHOMETRICS[measurementType] || {};
                        currentAnnotations.push({
                            type: 'line',
                            part: 'measurement',
                            measurement: measurementType,
                            measurementName: measurementInfo.name || measurementType,
                            bodyPart: measurementInfo.body_part || 'unknown',
                            view: measurementInfo.view || 'unknown',
                            x1: Math.round(lineStart.x),
                            y1: Math.round(lineStart.y),
                            x2: Math.round(endPoint.x),
                            y2: Math.round(endPoint.y),
                            pixelLength: Math.round(pixelLength)
                        });
                        saveCurrentAnnotations();
                        lineStart = null;
                        renderAnnotations();
                    } else {
                        // Scale bar - store temp data and show inputs for value entry
                        tempScaleLine = {
                            x1: Math.round(lineStart.x),
                            y1: Math.round(lineStart.y),
                            x2: Math.round(endPoint.x),
                            y2: Math.round(endPoint.y),
                            pixelLength: Math.round(pixelLength)
                        };
                        // Show scale inputs and populate pixel length
                        document.getElementById('scalePixels').textContent = Math.round(pixelLength);
                        document.getElementById('scaleInputs').style.display = 'flex';
                        document.getElementById('scaleValue').focus();
                        lineStart = null;
                        renderAnnotations();
                    }
                }
            }
        }

        function onCanvasMouseMove(e) {
            const coords = getCanvasCoords(e);
            const mode = getDrawMode();

            // Edit mode: drag vertex/corner/endpoint
            if (editMode && isDraggingVertex && editingAnnotationIndex !== null && draggedVertexIndex !== null) {
                const annotation = currentAnnotations[editingAnnotationIndex];
                if (!annotation) return;

                const newX = Math.round(coords.x);
                const newY = Math.round(coords.y);

                if (draggedVertexType === 'poly') {
                    annotation.points[draggedVertexIndex] = [newX, newY];
                } else if (draggedVertexType === 'box') {
                    // Box corners: 0=TL, 1=TR, 2=BR, 3=BL
                    // Dragging a corner resizes the box
                    const corners = [
                        [annotation.x, annotation.y],
                        [annotation.x + annotation.w, annotation.y],
                        [annotation.x + annotation.w, annotation.y + annotation.h],
                        [annotation.x, annotation.y + annotation.h]
                    ];
                    corners[draggedVertexIndex] = [newX, newY];
                    // Recalculate box from corners (opposite corner stays fixed)
                    const oppositeIdx = (draggedVertexIndex + 2) % 4;
                    const [ox, oy] = corners[oppositeIdx];
                    annotation.x = Math.min(newX, ox);
                    annotation.y = Math.min(newY, oy);
                    annotation.w = Math.abs(newX - ox);
                    annotation.h = Math.abs(newY - oy);
                } else if (draggedVertexType === 'line') {
                    // Line endpoints: 0=start, 1=end
                    if (draggedVertexIndex === 0) {
                        annotation.x1 = newX;
                        annotation.y1 = newY;
                    } else {
                        annotation.x2 = newX;
                        annotation.y2 = newY;
                    }
                    // Recalculate pixel length
                    annotation.pixelLength = Math.round(Math.sqrt(
                        Math.pow(annotation.x2 - annotation.x1, 2) +
                        Math.pow(annotation.y2 - annotation.y1, 2)
                    ));
                }
                renderAnnotations();
                return;
            }

            if (mode === 'box' && isDrawing) {
                drawStart.current = coords;
                renderAnnotations();
            } else if (mode === 'poly' && polyPoints.length > 0) {
                // Track mouse for polygon preview line
                polyMousePos = coords;
                renderAnnotations();
            } else if (mode === 'line' && lineStart) {
                // Track mouse for line preview (with or without snapping)
                const freehand = document.getElementById('freehandMode').checked;
                polyMousePos = freehand ? coords : snapToAxis(lineStart.x, lineStart.y, coords.x, coords.y);
                renderAnnotations();
            }
        }

        function onCanvasMouseUp(e) {
            // Edit mode: finish dragging vertex
            if (editMode && isDraggingVertex) {
                isDraggingVertex = false;
                saveCurrentAnnotations();
                renderAnnotations();
                return;
            }

            if (!isDrawing || getDrawMode() !== 'box') return;

            const coords = getCanvasCoords(e);
            const x = Math.min(drawStart.x, coords.x);
            const y = Math.min(drawStart.y, coords.y);
            const w = Math.abs(coords.x - drawStart.x);
            const h = Math.abs(coords.y - drawStart.y);

            // Only add if box is big enough
            if (w > 5 && h > 5) {
                currentAnnotations.push({
                    type: 'box',
                    part: getSelectedPart(),
                    x: Math.round(x),
                    y: Math.round(y),
                    w: Math.round(w),
                    h: Math.round(h)
                });
                saveCurrentAnnotations();
            }

            isDrawing = false;
            drawStart = null;
            renderAnnotations();
        }

        function onCanvasDblClick(e) {
            // Complete polygon on double-click
            closePolygon();
        }

        function closePolygon() {
            if (polyPoints.length >= 3) {
                const part = getSelectedPart();
                currentAnnotations.push({
                    type: 'poly',
                    part: part,
                    points: polyPoints.map(p => [Math.round(p[0]), Math.round(p[1])])
                });
                saveCurrentAnnotations();

                // Auto-detect color for head/mesosoma/gaster polygons
                const colorPart = part === 'cranium' ? 'head' : part;
                if (['head', 'mesosoma', 'gaster'].includes(colorPart)) {
                    setTimeout(() => autoExtractColor(colorPart), 100);
                }
            }
            polyPoints = [];
            polyMousePos = null;
            renderAnnotations();
        }

        function saveScaleLine() {
            if (!tempScaleLine) {
                alert('Draw a line on the scale bar first');
                return;
            }

            const valueInput = document.getElementById('scaleValue');
            const unitSelect = document.getElementById('scaleUnit');
            const realValue = parseFloat(valueInput.value);

            if (!realValue || realValue <= 0) {
                alert('Enter a valid scale value');
                valueInput.focus();
                return;
            }

            const unit = unitSelect.value;
            const pixelsPerUnit = tempScaleLine.pixelLength / realValue;

            currentAnnotations.push({
                type: 'line',
                part: 'scale',
                x1: tempScaleLine.x1,
                y1: tempScaleLine.y1,
                x2: tempScaleLine.x2,
                y2: tempScaleLine.y2,
                pixelLength: tempScaleLine.pixelLength,
                realValue: realValue,
                unit: unit,
                pixelsPerUnit: Math.round(pixelsPerUnit * 100) / 100
            });

            saveCurrentAnnotations();

            // Reset
            tempScaleLine = null;
            valueInput.value = '';
            document.getElementById('scalePixels').textContent = '—';
            document.getElementById('scaleInputs').style.display = 'none';
            renderAnnotations();
        }

        function findAnnotationAt(x, y) {
            for (let i = currentAnnotations.length - 1; i >= 0; i--) {
                const a = currentAnnotations[i];
                if (a.type === 'box') {
                    if (x >= a.x && x <= a.x + a.w && y >= a.y && y <= a.y + a.h) {
                        return i;
                    }
                } else if (a.type === 'poly') {
                    if (pointInPolygon(x, y, a.points)) {
                        return i;
                    }
                } else if (a.type === 'line') {
                    if (pointNearLine(x, y, a.x1, a.y1, a.x2, a.y2, 10)) {
                        return i;
                    }
                }
            }
            return null;
        }

        function pointNearLine(px, py, x1, y1, x2, y2, threshold) {
            // Calculate distance from point to line segment
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;

            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = lenSq !== 0 ? dot / lenSq : -1;

            let xx, yy;
            if (param < 0) {
                xx = x1;
                yy = y1;
            } else if (param > 1) {
                xx = x2;
                yy = y2;
            } else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }

            const dist = Math.sqrt(Math.pow(px - xx, 2) + Math.pow(py - yy, 2));
            return dist <= threshold;
        }

        function snapToAxis(x1, y1, x2, y2, threshold = 15) {
            // Calculate angle in degrees
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            // Snap to horizontal (0° or 180°)
            if (Math.abs(angle) <= threshold || Math.abs(angle) >= 180 - threshold) {
                return { x: x2, y: y1, snapped: 'horizontal' };
            }
            // Snap to vertical (90° or -90°)
            if (Math.abs(Math.abs(angle) - 90) <= threshold) {
                return { x: x1, y: y2, snapped: 'vertical' };
            }
            // No snap
            return { x: x2, y: y2, snapped: null };
        }

        function pointInPolygon(x, y, points) {
            let inside = false;
            for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
                const xi = points[i][0], yi = points[i][1];
                const xj = points[j][0], yj = points[j][1];
                const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function toggleDeleteMode() {
            deleteMode = !deleteMode;
            const btn = document.getElementById('deleteAnnotBtn');
            const canvas = document.getElementById('annotationCanvas');

            if (deleteMode) {
                btn.classList.add('delete-mode-active');
                btn.textContent = 'Exit Delete';
                canvas.classList.add('delete-mode');
                // Cancel any drawing in progress
                cancelDrawing();
            } else {
                btn.classList.remove('delete-mode-active');
                btn.textContent = 'Delete Mode';
                canvas.classList.remove('delete-mode');
            }
        }

        function toggleEditMode() {
            editMode = !editMode;
            const btn = document.getElementById('editAnnotBtn');
            const canvas = document.getElementById('annotationCanvas');

            if (editMode) {
                btn.classList.add('delete-mode-active');
                btn.textContent = 'Exit Edit';
                canvas.style.cursor = 'pointer';
                // Exit delete mode if active
                if (deleteMode) toggleDeleteMode();
                // Cancel any drawing in progress
                cancelDrawing();
            } else {
                btn.classList.remove('delete-mode-active');
                btn.textContent = 'Edit Points';
                canvas.style.cursor = 'crosshair';
                exitEditAnnotation();
            }
            renderAnnotations();
        }

        function exitEditAnnotation() {
            editingAnnotationIndex = null;
            draggedVertexIndex = null;
            draggedVertexType = null;
            isDraggingVertex = false;
        }

        function findVertexAt(x, y, threshold = 10) {
            // Find if click is near a vertex/corner/endpoint of any annotation
            for (let i = 0; i < currentAnnotations.length; i++) {
                const a = currentAnnotations[i];

                if (a.type === 'poly') {
                    for (let j = 0; j < a.points.length; j++) {
                        const [vx, vy] = a.points[j];
                        if (Math.sqrt(Math.pow(x - vx, 2) + Math.pow(y - vy, 2)) <= threshold) {
                            return { annotationIndex: i, vertexIndex: j, type: 'poly' };
                        }
                    }
                } else if (a.type === 'box') {
                    // Box corners: 0=TL, 1=TR, 2=BR, 3=BL
                    const corners = [
                        [a.x, a.y],                 // 0: top-left
                        [a.x + a.w, a.y],           // 1: top-right
                        [a.x + a.w, a.y + a.h],     // 2: bottom-right
                        [a.x, a.y + a.h]            // 3: bottom-left
                    ];
                    for (let j = 0; j < corners.length; j++) {
                        const [vx, vy] = corners[j];
                        if (Math.sqrt(Math.pow(x - vx, 2) + Math.pow(y - vy, 2)) <= threshold) {
                            return { annotationIndex: i, vertexIndex: j, type: 'box' };
                        }
                    }
                } else if (a.type === 'line') {
                    // Line endpoints: 0=start, 1=end
                    const endpoints = [[a.x1, a.y1], [a.x2, a.y2]];
                    for (let j = 0; j < endpoints.length; j++) {
                        const [vx, vy] = endpoints[j];
                        if (Math.sqrt(Math.pow(x - vx, 2) + Math.pow(y - vy, 2)) <= threshold) {
                            return { annotationIndex: i, vertexIndex: j, type: 'line' };
                        }
                    }
                }
            }
            return null;
        }

        function findAnnotationAtPoint(x, y) {
            // Find if click is inside any annotation
            for (let i = 0; i < currentAnnotations.length; i++) {
                const a = currentAnnotations[i];
                if (a.type === 'poly' && pointInPolygon(x, y, a.points)) {
                    return i;
                } else if (a.type === 'box') {
                    if (x >= a.x && x <= a.x + a.w && y >= a.y && y <= a.y + a.h) {
                        return i;
                    }
                } else if (a.type === 'line') {
                    // Check if near the line (within threshold)
                    const dist = pointToLineDistance(x, y, a.x1, a.y1, a.x2, a.y2);
                    if (dist <= 8) return i;
                }
            }
            return null;
        }

        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = lenSq !== 0 ? dot / lenSq : -1;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return Math.sqrt(Math.pow(px - xx, 2) + Math.pow(py - yy, 2));
        }

        function toggleDeleteDropdown() {
            const dropdown = document.getElementById('deleteDropdown');
            const list = document.getElementById('deleteDropdownList');

            if (dropdown.style.display === 'none') {
                // Populate list
                if (currentAnnotations.length === 0) {
                    list.innerHTML = '<div style="color:#888;padding:0.5rem;font-size:0.75rem;">No annotations</div>';
                } else {
                    list.innerHTML = currentAnnotations.map((a, i) => {
                        const color = PART_COLORS[a.part] || '#fff';
                        // For measurement lines, show the measurement acronym
                        let label;
                        if (a.part === 'measurement' && a.measurement) {
                            label = `${a.measurement} - measurement line`;
                        } else if (a.part === 'scale' && a.realValue) {
                            label = `Scale: ${a.realValue}${a.unit}`;
                        } else {
                            label = `${a.part} (${a.type})`;
                        }
                        return `<label style="display:flex;align-items:center;gap:0.3rem;padding:0.25rem;cursor:pointer;font-size:0.75rem;border-radius:3px;margin-bottom:2px;background:#0f3460;">
                            <input type="checkbox" data-index="${i}" style="cursor:pointer;">
                            <span style="width:10px;height:10px;background:${color};border-radius:2px;"></span>
                            <span style="color:#fff;">${label}</span>
                        </label>`;
                    }).join('');
                }
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        }

        function confirmDeleteSelected() {
            const checkboxes = document.querySelectorAll('#deleteDropdownList input:checked');
            const indices = Array.from(checkboxes).map(cb => parseInt(cb.dataset.index)).sort((a, b) => b - a);

            if (indices.length === 0) {
                alert('No annotations selected');
                return;
            }

            const msg = indices.length === 1
                ? 'Delete this annotation?'
                : `Delete ${indices.length} annotations?`;

            if (confirm(msg)) {
                // Delete from highest index to lowest to preserve indices
                indices.forEach(i => currentAnnotations.splice(i, 1));
                saveCurrentAnnotations();
                renderAnnotations();
                document.getElementById('deleteDropdown').style.display = 'none';
            }
        }

        function deleteSelectedAnnotation() {
            // Legacy function - kept for keyboard shortcut
            // In delete mode, this is handled by clicking
            if (!deleteMode) {
                toggleDeleteMode();
            }
        }

        function clearAllAnnotations() {
            if (currentAnnotations.length === 0) return;
            if (confirm('Clear all annotations for this image?')) {
                currentAnnotations = [];
                selectedAnnotation = null;
                saveCurrentAnnotations();
                renderAnnotations();
            }
        }

        function cancelDrawing() {
            isDrawing = false;
            drawStart = null;
            polyPoints = [];
            polyMousePos = null;
            lineStart = null;
            tempScaleLine = null;
            document.getElementById('scaleInputs').style.display = 'none';
            document.getElementById('scaleValue').value = '';
            document.getElementById('scalePixels').textContent = '—';
            renderAnnotations();
        }

        // Override updateDisplay to also load annotations
        const originalUpdateDisplay = updateDisplay;
        updateDisplay = function() {
            originalUpdateDisplay();
            if (canvas) {
                // Wait for image to load before resizing canvas
                const img = document.getElementById('currentImage');
                if (img.complete) {
                    resizeCanvas();
                }
            }
        };
    </script>
</body>
</html>
