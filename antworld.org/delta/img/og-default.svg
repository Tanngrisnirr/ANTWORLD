<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
  </defs>

  <!-- Background - pure black -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Logo (centered, massive) -->
  <g transform="translate(250, 20)">
    <text x="0" y="320" font-size="380" font-weight="900" font-family="Inter, Arial, sans-serif"
          fill="white" stroke="url(#blueGrad)" stroke-width="14" paint-order="stroke fill">A</text>
    <text x="250" y="320" font-size="380" font-weight="900" font-family="Inter, Arial, sans-serif"
          fill="#0a0a1a" stroke="url(#blueGrad)" stroke-width="14" paint-order="stroke fill">W</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-size="64" font-weight="600"
        font-family="Inter, Arial, sans-serif" fill="url(#blueGrad)">Interactive ID Keys</text>

  <!-- URL -->
  <text x="600" y="570" text-anchor="middle" font-size="48" font-weight="400"
        font-family="Inter, Arial, sans-serif" fill="#87CEEB">antworld.org</text>
</svg>
