<script>
// RSS Feed Loader
async function loadRSSFeed() {
    const rssContainer = document.getElementById('rssFeed');
    const apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=';
    const feedUrl = 'https://blog.myrmecologicalnews.org/feed/';

    try {
        const response = await fetch(apiUrl + encodeURIComponent(feedUrl));
        const data = await response.json();

        if (data.status === 'ok' && data.items) {
            let html = '';
            data.items.slice(0, 3).forEach(item => {
                const date = new Date(item.pubDate).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
                html += `
                    <div class="pheromone">
                        <div class="pheromone-title"><a href="${item.link}" target="_blank">${item.title}</a></div>
                        <div class="pheromone-date">${date}</div>
                        <div class="pheromone-desc">${item.description ? item.description.substring(0, 150) + '...' : ''}</div>
                    </div>
                `;
            });
            rssContainer.innerHTML = html;
        }
    } catch (error) {
        console.log('RSS feed error:', error);
        rssContainer.innerHTML = '<div class="pheromone"><div class="pheromone-desc">Visit <a href="https://blog.myrmecologicalnews.org/" target="_blank">Myrmecological News Blog</a> for latest ant research news.</div></div>';
    }
}

document.addEventListener('DOMContentLoaded', loadRSSFeed);
</script>
