// Get color for genus based on subfamily (interpolate between two colors)
function getSubfamilyColor(genus, indexInSubfamily, totalInSubfamily) {
    var subfamily = genusToSubfamily[genus] || 'Myrmicinae';
    var colors = subfamilyColors[subfamily] || ['#888888', '#cccccc'];
    // Interpolate between the two colors based on position
    var t = totalInSubfamily > 1 ? indexInSubfamily / (totalInSubfamily - 1) : 0.5;
    return interpolateColor(colors[0], colors[1], t);
}

function interpolateColor(color1, color2, t) {
    var r1 = parseInt(color1.slice(1, 3), 16);
    var g1 = parseInt(color1.slice(3, 5), 16);
    var b1 = parseInt(color1.slice(5, 7), 16);
    var r2 = parseInt(color2.slice(1, 3), 16);
    var g2 = parseInt(color2.slice(3, 5), 16);
    var b2 = parseInt(color2.slice(5, 7), 16);
    var r = Math.round(r1 + (r2 - r1) * t);
    var g = Math.round(g1 + (g2 - g1) * t);
    var b = Math.round(b1 + (b2 - b1) * t);
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// Custom labels with lines attached to actual pie segments
function addEvenlySpacedLabels(containerId, data, total) {
    var svg = d3.select("#" + containerId + " svg");
    var n = data.length;

    // Fixed pie dimensions (canvas now 800x480)
    var centerX = 400;
    var centerY = 242.5;
    var pieOuterRadius = 136.5;
    var labelRadius = pieOuterRadius + 55;

    var labelGroup = svg.append("g").attr("class", "evenly-spaced-labels");

    // Calculate actual segment angles based on data values
    // d3pie starts at top (-90°) and goes clockwise, sorted by value-desc
    var cumulativeAngle = -90; // Start at top

    data.forEach(function(item, i) {
        // Calculate this segment's angular size based on its value
        var segmentAngle = (item.value / total) * 360;

        // Middle angle of this segment (where the line should attach)
        var segmentMidAngle = cumulativeAngle + (segmentAngle / 2);
        var segmentMidRad = segmentMidAngle * Math.PI / 180;

        // Label positioned at same angle as segment (not evenly spaced)
        var labelAngleRad = segmentMidRad;

        // Line starts at the actual segment on the pie edge
        var lineStartX = centerX + pieOuterRadius * Math.cos(segmentMidRad);
        var lineStartY = centerY + pieOuterRadius * Math.sin(segmentMidRad);

        // Label position (at segment angle, close to segment)
        var labelX = centerX + labelRadius * Math.cos(labelAngleRad);
        var labelY = centerY + labelRadius * Math.sin(labelAngleRad);

        // Draw line from segment to label
        labelGroup.append("line")
            .attr("x1", lineStartX).attr("y1", lineStartY)
            .attr("x2", labelX).attr("y2", labelY)
            .attr("stroke", item.color).attr("stroke-width", 1.5).attr("opacity", 0.9);

        // Small dot at segment attachment point
        labelGroup.append("circle")
            .attr("cx", lineStartX).attr("cy", lineStartY)
            .attr("r", 3).attr("fill", item.color);

        // Position label text
        var pct = ((item.value / total) * 100).toFixed(1);
        var normalizedAngle = ((segmentMidAngle + 90) % 360 + 360) % 360;
        var textAnchor = normalizedAngle > 180 ? "end" : "start";
        var offsetX = normalizedAngle > 180 ? -8 : 8;

        labelGroup.append("text")
            .attr("x", labelX + offsetX).attr("y", labelY + 4)
            .attr("text-anchor", textAnchor)
            .attr("fill", "white").attr("font-size", "14px").attr("font-family", "arial")
            .text(item.label + " " + pct + "%");

        // Move to next segment
        cumulativeAngle += segmentAngle;
    });
}

<script>
var chartRebuilt = { subfamilies: false, tribes: false, genera: false };
var currentDisplayMode = 'percentage'; // 'percentage', 'value', 'both'

function getDisplayFormat() {
    switch(currentDisplayMode) {
        case 'percentage': return 'label-percentage1';
        case 'value': return 'label-value1';
        case 'both': return 'label'; // We'll use modified labels
        default: return 'label-percentage1';
    }
}

// Create data with combined labels for "both" mode
function prepareDataForDisplay(data) {
    if (currentDisplayMode !== 'both') {
        return data;
    }
    var total = data.reduce(function(sum, item) { return sum + item.value; }, 0);
    return data.map(function(item) {
        var pctNum = (item.value / total) * 100;
        var pct = pctNum % 1 === 0 ? pctNum.toFixed(0) : pctNum.toFixed(1);
        return {
            label: item.label + ' (' + item.value + '; ' + pct + '%)',
            value: item.value,
            color: item.color
        };
    });
}

function setDisplayMode(mode) {
    currentDisplayMode = mode;
    // Update UI
    document.querySelectorAll('.display-option').forEach(function(opt) {
        opt.classList.remove('active');
        if (opt.querySelector('input').value === mode) {
            opt.classList.add('active');
        }

    // Rebuild all visible charts
    rebuildChart('subfamilies');
    rebuildChart('tribes');
    rebuildChart('genera');
    rebuildGeneraRest();

function showChart(chartType) {
    // Update tabs
    document.querySelectorAll('.chart-tab').forEach(function(tab) {
        tab.classList.remove('active');
    });
    event.target.classList.add('active');

    // Update containers
    document.querySelectorAll('.chart-container').forEach(function(container) {
        container.classList.remove('active');
    });
    document.getElementById(chartType + '-container').classList.add('active');

    // Rebuild chart on first view to fix label positioning
    if (!chartRebuilt[chartType]) {
        setTimeout(function() {
            if (chartType === 'genera') {
                // Use color scheme rebuild for genera
                rebuildGeneraWithOrg('subfamily');
                rebuildGeneraRestWithOrg('subfamily');
            } else {
                rebuildChart(chartType);
            }
            chartRebuilt[chartType] = true;
        }, 50);
    }

    // Pull out the grey "17 others" segment and align titles when Genera tab is shown
    if (chartType === 'genera') {
        setTimeout(function() {
            var lastIndex = document.querySelectorAll('#pieGenera [data-index]').length - 1;
            var segment = document.querySelector('#pieGenera [data-index="' + lastIndex + '"]');
            if (segment && segment.parentNode) {
                var g = segment.parentNode;
                var currentTransform = g.getAttribute('transform') || '';
                if (currentTransform.indexOf('translate(25') === -1) {
                    g.setAttribute('transform', currentTransform + ' translate(25, -15)');
                }
            }
            alignChartTitles();
        }, 200);
        // Enable sticky sidebar for genera
        enableStickySidebar(true);
    } else {
        // Disable sticky sidebar for other tabs
        enableStickySidebar(false);
    }
}

// Sticky sidebar for genera only
var stickyEnabled = false;
var sidebarScrollHandler = null;

function enableStickySidebar(enable) {
    var sidebar = document.querySelector('.tax-sidebar');
    var wrapper = document.querySelector('.tax-sidebar-wrapper');
    if (!sidebar || !wrapper) return;

    stickyEnabled = enable;

    if (enable) {
        // Add scroll handler
        if (!sidebarScrollHandler) {
            sidebarScrollHandler = function() {
                if (!stickyEnabled) return;

                var scrollY = window.scrollY || window.pageYOffset;
                var wrapperRect = wrapper.getBoundingClientRect();
                var wrapperTop = wrapper.offsetTop;
                var headerOffset = 80;

                if (wrapperRect.top < headerOffset) {
                    sidebar.classList.add('sticky-active');
                } else {
                    sidebar.classList.remove('sticky-active');
                }
            };
            window.addEventListener('scroll', sidebarScrollHandler);
        }
        // Trigger initial check
        sidebarScrollHandler();
    } else {
        // Remove sticky class
        sidebar.classList.remove('sticky-active');
    }
}

function updateTotals() {
    var subfamiliesTotal = subfamiliesData.reduce(function(sum, item) { return sum + item.value; }, 0);
    var tribesTotal = tribesData.reduce(function(sum, item) { return sum + item.value; }, 0);
    // Genera total = top genera + all rest genera (including "other genera")
    var generaTotal = topGeneraTotal + restTotal;
    // Count of named genera (excluding "Other genera" and "Other tribes" entries)
    var namedGeneraCount = topGeneraData.length + restGeneraData.length - 1; // -1 for "Other genera"
    var namedTribesCount = tribesData.length - 1; // -1 for "Other tribes"

    document.getElementById('subfamilies-total').innerHTML = 'Total: <strong>' + subfamiliesTotal + '</strong> species in <strong>' + subfamiliesData.length + '</strong> subfamilies';
    document.getElementById('tribes-total').innerHTML = 'Total: <strong>' + tribesTotal + '</strong> species in <strong>' + namedTribesCount + '+</strong> tribes';
    document.getElementById('genera-total').innerHTML = 'Total: <strong>' + generaTotal + '</strong> species in <strong>' + namedGeneraCount + '+</strong> genera';
}

function buildFilters() {
    buildFilterFor('subfamilies', subfamiliesData);
    buildFilterFor('tribes', tribesData);
    buildFilterFor('genera', topGeneraData);
    buildFilterFor('genera-rest', restGeneraData);
}

function buildFilterFor(type, data) {
    var container = document.getElementById(type + '-filters');
    var html = '';
    data.forEach(function(item, index) {
        html += '<label class="chart-filter-item">';
        html += '<input type="checkbox" checked data-chart="' + type + '" data-index="' + index + '">';
        html += '<span class="color-dot" style="background:' + item.color + '"></span>';
        html += item.label + ' (' + item.value + ')';
        html += '</label>';
    });
    html += '<span class="filter-btns">';
    html += '<button class="filter-btn" onclick="toggleAllFilters(\'' + type + '\', true)">All</button>';
    html += '<button class="filter-btn" onclick="toggleAllFilters(\'' + type + '\', false)">None</button>';
    html += '</span>';
    container.innerHTML = html;
}

function toggleAllFilters(type, checked) {
    document.querySelectorAll('[data-chart="' + type + '"]').forEach(function(cb) {
        cb.checked = checked;
    });
    if (type === 'genera-rest') {
        rebuildGeneraRestFiltered();
    } else {
        rebuildChart(type);
    }
}

function rebuildChart(type) {
    var data, containerId, chartVar, config;

    if (type === 'subfamilies') {
        data = subfamiliesData;
        containerId = 'pieSubfamilies';
        config = {
            canvasWidth: 700, canvasHeight: 500,
            pieInnerRadius: "80%", pieOuterRadius: "70%",
            pieDistance: 20, fontSize: 20, percentSize: 20,
            sortOrder: "label-desc"
        };
    } else if (type === 'tribes') {
        data = tribesData;
        containerId = 'pieTribes';
        config = {
            canvasWidth: 950, canvasHeight: 600,
            pieInnerRadius: "75%", pieOuterRadius: "55%",
            pieDistance: 45, fontSize: 16, percentSize: 16,
            sortOrder: "value-desc"
        };
    } else if (type === 'genera') {
        data = topGeneraData;
        containerId = 'pieGenera';
        config = {
            canvasWidth: 650, canvasHeight: 480,
            pieInnerRadius: "75%", pieOuterRadius: "65%",
            pieDistance: 25, fontSize: 16, percentSize: 16,
            sortOrder: "value-desc"
        };
    }

    // Get filtered data based on checkboxes
    var filteredData = [];
    document.querySelectorAll('[data-chart="' + type + '"]').forEach(function(cb, index) {
        if (cb.checked) {
            filteredData.push(data[index]);
        }
    });

    // For genera chart, always add the grey "others" segment
    if (type === 'genera') {
        filteredData = filteredData.concat([{"label": restGeneraData.length + " others","value": restTotal,"color": "#888888"}]);
    }

    if (filteredData.length === 0) {
        document.getElementById(containerId).innerHTML = '<p style="color:white;text-align:center;padding:50px;">Select at least one item</p>';
        return;
    }

    // Clear existing chart
    document.getElementById(containerId).innerHTML = '';

    // Rebuild chart with filtered data
    var subtitleText = type === 'subfamilies' ? 'by Subfamilies' : (type === 'tribes' ? 'by Tribes' : 'by Genera');
    var displayData = prepareDataForDisplay(filteredData);

    new d3pie(containerId, {
        "header": {
            "title": {"text": "Species","color": "white","fontSize": 45,"font": "courier"},
            "subtitle": {"text": subtitleText,"color": "white","fontSize": 25,"font": "courier"},
            "location": "pie-center","titleSubtitlePadding": 0
        },
        "size": {
            "canvasWidth": config.canvasWidth,
            "canvasHeight": config.canvasHeight,
            "pieInnerRadius": config.pieInnerRadius,
            "pieOuterRadius": config.pieOuterRadius
        },
        "data": {"sortOrder": config.sortOrder,"content": displayData},
        "labels": {
            "outer": {"format": getDisplayFormat(),"pieDistance": config.pieDistance},
            "inner": {"format": "none"},
            "mainLabel": {"fontSize": config.fontSize,"color": "white"},
            "percentage": {"color": "white","fontSize": config.percentSize,"decimalPlaces": 1},
            "value": {"color": "white","fontSize": config.percentSize},
            "lines": {"enabled": true},
            "truncation": {"enabled": true}
        },
        "effects": {"pullOutSegmentOnClick": {"effect": "linear","speed": 400,"size": 20}},
        "misc": {"gradient": {"enabled": true,"percentage": 100,"segmentStroke": "pink"}}
    });

    // Update total display
    var total = filteredData.reduce(function(sum, item) { return sum + item.value; }, 0);
    var typeName = type === 'subfamilies' ? 'subfamilies' : (type === 'tribes' ? 'tribes' : 'genera');
    var count = type === 'genera' ? filteredData.length - 1 : filteredData.length; // Don't count grey "others" segment
    document.getElementById(type + '-total').innerHTML = 'Showing: <strong>' + total + '</strong> species in <strong>' + count + '</strong> ' + typeName;

    // Align titles if genera chart
    if (type === 'genera') {
        setTimeout(alignChartTitles, 50);
    }
}

function addFilterListeners() {
    document.querySelectorAll('.chart-filter-item input').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var chartType = this.getAttribute('data-chart');
            if (chartType === 'genera-rest') {
                rebuildGeneraRestFiltered();
            } else {
                rebuildChart(chartType);
            }
        });
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    updateTotals();
    buildFilters();
    addFilterListeners();

    // Rebuild subfamilies (visible on load) to fix label positioning
    setTimeout(function() {
        rebuildChart('subfamilies');
        chartRebuilt.subfamilies = true;
    }, 100);
});
</script>


<script>
function exportChartSVG(containerId, filename) {
    var container = document.getElementById(containerId);
    var svg = container.querySelector('svg');
    if (!svg) {
        alert('Chart not found');
        return;
    }

    // Clone SVG to add background without modifying original
    var svgClone = svg.cloneNode(true);
    var width = svg.getAttribute('width') || svg.width.baseVal.value || 800;
    var height = svg.getAttribute('height') || svg.height.baseVal.value || 600;

    // Use current background setting
    var bgColor = (typeof currentChartBg !== 'undefined' && currentChartBg === 'light') ? '#ffffff' : '#1a1a2e';
    var textColor = (typeof currentChartBg !== 'undefined' && currentChartBg === 'light') ? '#1a1a2e' : 'white';

    // Create background rectangle as first element
    var bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bgRect.setAttribute('width', width);
    bgRect.setAttribute('height', height);
    bgRect.setAttribute('fill', bgColor);
    svgClone.insertBefore(bgRect, svgClone.firstChild);

    // Update text colors in clone
    svgClone.querySelectorAll('text').forEach(function(text) {
        text.setAttribute('fill', textColor);
    });

    var serializer = new XMLSerializer();
    var svgString = serializer.serializeToString(svgClone);
    svgString = '<' + '?xml version="1.0" encoding="UTF-8"?' + '>\n' + svgString;

    downloadFile(svgString, filename + '.svg', 'image/svg+xml;charset=utf-8;');
}

function exportChartPNG(containerId, filename) {
    var container = document.getElementById(containerId);
    var svg = container.querySelector('svg');
    if (!svg) {
        alert('Chart not found');
        return;
    }

    // Clone SVG and apply background/text colors
    var svgClone = svg.cloneNode(true);
    var bgColor = (typeof currentChartBg !== 'undefined' && currentChartBg === 'light') ? '#ffffff' : '#1a1a2e';
    var textColor = (typeof currentChartBg !== 'undefined' && currentChartBg === 'light') ? '#1a1a2e' : 'white';

    // Update text colors in clone for PNG rendering
    svgClone.querySelectorAll('text').forEach(function(text) {
        text.setAttribute('fill', textColor);
    });

    var serializer = new XMLSerializer();
    var svgString = serializer.serializeToString(svgClone);
    var svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
    var url = URL.createObjectURL(svgBlob);

    var img = new Image();
    img.onload = function() {
        var canvas = document.createElement('canvas');
        canvas.width = svg.width.baseVal.value || 800;
        canvas.height = svg.height.baseVal.value || 600;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        var pngUrl = canvas.toDataURL('image/png');
        var a = document.createElement('a');
        a.href = pngUrl;
        a.download = filename + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };
    img.src = url;
}

function exportDataCSV(data, filename) {
    var csv = 'Label,Species Count,Color\n';
    var total = data.reduce(function(sum, item) { return sum + item.value; }, 0);

    data.forEach(function(item) {
        var percentage = ((item.value / total) * 100).toFixed(1);
        csv += '"' + item.label + '",' + item.value + ',' + percentage + '%\n';
    });

    csv += '\nTotal,' + total + ',100%\n';
    downloadFile(csv, filename + '.csv', 'text/csv;charset=utf-8;');
}

function exportAllDataCSV() {
    var csv = 'ANTWORLD.ORG - Taxonomical Diversity Data\n';
    csv += 'Exported: ' + new Date().toLocaleString() + '\n\n';

    csv += '=== SUBFAMILIES ===\n';
    csv += 'Subfamily,Species Count\n';
    subfamiliesData.forEach(function(item) {
        csv += '"' + item.label + '",' + item.value + '\n';
    });

    csv += '\n=== TRIBES ===\n';
    csv += 'Tribe,Species Count\n';
    tribesData.forEach(function(item) {
        csv += '"' + item.label + '",' + item.value + '\n';
    });

    csv += '\n=== GENERA ===\n';
    csv += 'Genus,Species Count\n';
    generaData.forEach(function(item) {
        csv += '"' + item.label + '",' + item.value + '\n';
    });

    downloadFile(csv, 'antworld_taxonomy_data.csv', 'text/csv;charset=utf-8;');
}

function exportAllDataJSON() {
    var data = {
        source: 'AntWorld.org',
        exported: new Date().toISOString(),
        region: 'Palearctic',
        subfamilies: subfamiliesData.map(function(item) {
            return { name: item.label, speciesCount: item.value };
        }),
        tribes: tribesData.map(function(item) {
            return { name: item.label, speciesCount: item.value };
        }),
        topGenera: generaData.map(function(item) {
            return { name: item.label, speciesCount: item.value };
        })
    };

    downloadFile(JSON.stringify(data, null, 2), 'antworld_taxonomy_data.json', 'application/json;charset=utf-8;');
}

function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// Get current active chart info
function getCurrentChart() {
    var activeContainer = document.querySelector('.chart-container.active');
    if (!activeContainer) return null;

    var id = activeContainer.id;
    if (id === 'subfamilies-container') return { containerId: 'pieSubfamilies', name: 'subfamilies_chart' };
    if (id === 'tribes-container') return { containerId: 'pieTribes', name: 'tribes_chart' };
    if (id === 'genera-container') return { containerId: 'pieGenera', name: 'genera_chart' };
    return null;
}

function exportCurrentChartSVG() {
    var chart = getCurrentChart();
    if (chart) exportChartSVG(chart.containerId, chart.name);
}

function exportCurrentChartPNG() {
    var chart = getCurrentChart();
    if (chart) exportChartPNG(chart.containerId, chart.name);
}

function exportCurrentChartJPEG() {
    var chart = getCurrentChart();
    if (chart) exportChartJPEG(chart.containerId, chart.name);
}

<script>
var currentChartBg = 'dark';

function setChartBackground(mode) {
    currentChartBg = mode;
    var sections = document.querySelectorAll('.chart-section');
    var textColor = mode === 'light' ? '#1a1a2e' : 'white';

    // Update toggle buttons
    document.querySelectorAll('.bg-toggle-btn').forEach(function(btn) {
        btn.classList.remove('active');
        if (btn.classList.contains(mode)) {
            btn.classList.add('active');
        }
    });

    // Update chart sections
    sections.forEach(function(section) {
        if (mode === 'light') {
            section.classList.add('light-bg');
        } else {
            section.classList.remove('light-bg');
        }
    });

    // Update all SVG text elements
    document.querySelectorAll('.chart-section svg text').forEach(function(text) {
        text.style.fill = textColor;
    });

    // Update d3pie labels and titles
    document.querySelectorAll('.chart-section [class*="_title"], .chart-section [class*="_subtitle"]').forEach(function(el) {
        el.style.fill = textColor;
    });

    // Update evenly spaced labels
    document.querySelectorAll('.evenly-spaced-labels text').forEach(function(text) {
        text.style.fill = textColor;
    });
}

</script>
