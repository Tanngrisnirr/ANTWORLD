<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | AntWorld.org</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #87CEEB;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 24px;
        }
        .hint {
            font-size: 14px;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 20px;
            margin-top: 20px;
        }
        button {
            background: #87CEEB;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #a8d8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128268;</div>
        <h1>You're Offline</h1>
        <p>This page isn't available offline yet. Connect to the internet to access AntWorld.org.</p>
        <button onclick="location.reload()">Try Again</button>
        <p class="hint">
            Pages you've visited before are cached and available offline.<br>
            Try navigating to the <a href="/" style="color:#87CEEB;">home page</a>.
        </p>
    </div>
</body>
</html>
