<script>
$(document).ready(function(){
	// Hide tests 2-5 initially (test 1 visible by default)
	$(".test2, .test3, .test4, .test5").hide();
	// Hide all reveal solutions initially
	$(".group3").hide();

	// Test switchers using data attributes (event delegation)
	$(document).on("click", "[data-test]", function(e){
		e.preventDefault();
		var test = $(this).data("test");
		// Hide all tests
		$("#active_test, .test2, .test3, .test4, .test5").hide();
		// Show selected test
		if(test == 1) $("#active_test").show();
		else $(".test" + test).show();
	});

	// Reveal solution toggle - click h2 with spinner icon to show/hide answer
	$("h2:has(.icon-spinner)").css("cursor", "pointer").click(function(){
		$(this).next(".group3").slideToggle("slow");
	});
});
</script>
