<script>
// Geographic diversity data
var geoData = {
    top3: [
        { country: "China", species: 1391, genera: 113, subfamilies: 12 },

        { country: "Mongolia", species: 76, genera: 17, subfamilies: 3 },
        { country: "NSUK", species: 59, genera: 18, subfamilies: 4 }
    ]
};

function exportGeoDataCSV() {
    var csv = 'ANTWORLD.ORG - Geographic Diversity Data\n';
    csv += 'Exported: ' + new Date().toLocaleString() + '\n\n';

    csv += '=== TOP 3 COUNTRIES ===\n';
    csv += 'Rank,Country,Species,Genera,Subfamilies\n';
    geoData.top3.forEach(function(row, i) {
        csv += (i + 1) + ',"' + row.country + '",' + row.species + ',' + row.genera + ',' + row.subfamilies + '\n';
    });

    csv += '\n=== TOP 10 COUNTRIES (4-13) ===\n';
    csv += 'Rank,Country,Species,Genera,Subfamilies\n';
    geoData.top10.forEach(function(row, i) {
        csv += (i + 4) + ',"' + row.country + '",' + row.species + ',' + row.genera + ',' + row.subfamilies + '\n';
    });

    downloadFile(csv, 'antworld_geographic_diversity.csv', 'text/csv;charset=utf-8;');
}

function exportGeoDataJSON() {
    var data = {
        source: 'AntWorld.org',
        exported: new Date().toISOString(),
        region: 'Palearctic',
        description: 'Ant diversity by country rankings',
        rankings: {
            top3: geoData.top3.map(function(row, i) {
                return { rank: i + 1, country: row.country, species: row.species, genera: row.genera, subfamilies: row.subfamilies };
            }),
            top4to13: geoData.top10.map(function(row, i) {
                return { rank: i + 4, country: row.country, species: row.species, genera: row.genera, subfamilies: row.subfamilies };
            })
        }
    };

    downloadFile(JSON.stringify(data, null, 2), 'antworld_geographic_diversity.json', 'application/json;charset=utf-8;');
}

function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
