var mainChart = null;

$(function () {
    // Set global Highcharts options for offline export
    Highcharts.setOptions({
        exporting: {
            fallbackToExportServer: false
        }
    });

    updateCharts();
});

function getSelectedRealms() {
    var realms = [];
    ['palearctic', 'afrotropical', 'nearctic', 'neotropical', 'indomalayan', 'australasian'].forEach(function(r) {
        if (document.getElementById(r).checked) realms.push(r);
    });
    return realms;
}

function getFilteredData() {
    var selectedRealms = getSelectedRealms();
    return countryData.filter(function(d) {
        return selectedRealms.indexOf(d.realm) >= 0;
    }).sort(function(a, b) {
        return b.species - a.species;
    });
}

function updateCharts() {
    var filtered = getFilteredData();
    var isLight = document.documentElement.classList.contains('light-mode');
    var textColor = isLight ? '#1a1a2e' : '#ffffff';

    // Take top 15 for display
    var displayData = filtered.slice(0, 15);

    var categories = displayData.map(function(d) { return d.country; });
    var speciesData = displayData.map(function(d) { return d.species; });
    var generaData = displayData.map(function(d) { return d.genera; });
    var subfamiliesData = displayData.map(function(d) { return d.subfamilies; });

    // Calculate chart height based on number of countries
    var chartHeight = Math.max(400, displayData.length * 35 + 100);
    document.getElementById('main_chart').style.height = chartHeight + 'px';

    if (mainChart) {
        mainChart.destroy();
    }

    mainChart = Highcharts.chart('main_chart', {
        chart: {
            type: 'bar',
            backgroundColor: 'transparent',
            marginLeft: 130,
            spacingRight: 20,
            height: chartHeight
        },
        title: {text: ''},
        xAxis: {
            categories: categories,
            labels: {style: {color: textColor, fontSize: '13px'}, x: -10}
        },
        yAxis: {
            title: {text: ''},
            labels: {style: {color: textColor}}
        },
        legend: {itemStyle: {color: textColor}},
        credits: {enabled: false},
        exporting: {enabled: false},
        series: [
            {name: 'Species', data: speciesData, color: '#058DC7'},
            {name: 'Genera', data: generaData, color: '#50B432'},
            {name: 'Subfamilies', data: subfamiliesData, color: '#ED561B'}
        ]
    });
}

function selectAllRegions() {
    ['palearctic', 'afrotropical', 'nearctic', 'neotropical', 'indomalayan', 'australasian'].forEach(function(r) {
        document.getElementById(r).checked = true;
    });
    updateCharts();
}

function clearAllRegions() {
    ['palearctic', 'afrotropical', 'nearctic', 'neotropical', 'indomalayan', 'australasian'].forEach(function(r) {
        document.getElementById(r).checked = false;
    });
    updateCharts();
}

function exportChartLocal(format) {
    if (!mainChart) return;

    // Get SVG from chart
    var svg = mainChart.getSVG({
        chart: {backgroundColor: '#ffffff'},
        xAxis: {labels: {style: {color: '#1a1a2e'}}},
        yAxis: {labels: {style: {color: '#1a1a2e'}}},
        legend: {itemStyle: {color: '#1a1a2e'}}
    });

    var selectedRealms = getSelectedRealms();
    var filename = 'antworld_geo_diversity_' + selectedRealms.join('_');

    if (format === 'svg') {
        // Direct SVG download
        var blob = new Blob([svg], {type: 'image/svg+xml'});
        downloadBlob(blob, filename + '.svg');
    } else {
        // Convert to PNG/JPEG via canvas
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        var img = new Image();

        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;

            // White background for JPEG
            if (format === 'jpeg') {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.drawImage(img, 0, 0);

            var mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
            canvas.toBlob(function(blob) {
                downloadBlob(blob, filename + '.' + format);
            }, mimeType, 0.95);
        };

        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    }
}

function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>

<script>
// Export functions - use filtered data based on selected regions
function exportGeoDataCSV() {
    var filtered = getFilteredData();
    var selectedRealms = getSelectedRealms();

    var csv = 'ANTWORLD.ORG - Geographic Diversity Data\n';
    csv += 'Exported: ' + new Date().toLocaleString() + '\n';
    csv += 'Selected Realms: ' + (selectedRealms.length > 0 ? selectedRealms.join(', ') : 'None') + '\n\n';
    csv += 'Rank,Country,Species,Genera,Subfamilies,Realm\n';

    filtered.forEach(function(row, i) {
        csv += (i + 1) + ',"' + row.country + '",' + row.species + ',' + row.genera + ',' + row.subfamilies + ',"' + row.realm + '"\n';
    });

    var filename = 'antworld_geo_diversity_' + selectedRealms.join('_') + '.csv';
    downloadFile(csv, filename, 'text/csv;charset=utf-8;');
}

function exportGeoDataJSON() {
    var filtered = getFilteredData();
    var selectedRealms = getSelectedRealms();

    var data = {
        source: 'AntWorld.org',
        exported: new Date().toISOString(),
        selectedRealms: selectedRealms,
        description: 'Ant diversity by country - filtered by biogeographic realm',
        totalCountries: filtered.length,
        countries: filtered.map(function(row, i) {
            return {
                rank: i + 1,
                country: row.country,
                species: row.species,
                genera: row.genera,
                subfamilies: row.subfamilies,
                realm: row.realm
            };
        })
    };

    var filename = 'antworld_geo_diversity_' + selectedRealms.join('_') + '.json';
    downloadFile(JSON.stringify(data, null, 2), filename, 'application/json;charset=utf-8;');
}

function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
